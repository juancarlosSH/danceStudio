<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dance Class Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- LOGIN VIEW -->
      <section id="view-login" class="view active">
        <div class="login-bg"><span></span><span></span><span></span></div>
        <div class="login-card">
          <div class="login-header">
            <h1>Dance<br /><em>Studio</em></h1>
            <p data-i18n="appSubtitle"></p>
          </div>
          <form id="login-form" novalidate>
            <div class="field">
              <label for="login-name" data-i18n="labelName"></label>
              <input
                id="login-name"
                type="text"
                data-i18n-placeholder="placeholderName"
                autocomplete="username"
              />
            </div>
            <div class="field">
              <label for="login-password" data-i18n="labelPassword"></label>
              <input
                id="login-password"
                type="password"
                data-i18n-placeholder="placeholderPassword"
                autocomplete="current-password"
              />
            </div>
            <div id="login-error" class="error-msg hidden"></div>
            <button type="submit" id="login-btn">
              <span class="btn-text" data-i18n="btnEnter"></span>
              <span class="btn-loader hidden"></span>
            </button>
          </form>
          <div class="auth-switch">
            <span data-i18n="noAccount"></span>
            <button
              type="button"
              id="go-register"
              data-i18n="createOne"
            ></button>
          </div>
        </div>
      </section>

      <!-- REGISTER VIEW -->
      <section id="view-register" class="view hidden">
        <div class="login-bg"><span></span><span></span><span></span></div>
        <div class="login-card">
          <div class="login-header">
            <h1>Dance<br /><em>Studio</em></h1>
            <p data-i18n="appSubtitleRegister"></p>
          </div>
          <form id="register-form" novalidate>
            <div class="field">
              <label for="reg-name" data-i18n="labelName"></label>
              <input
                id="reg-name"
                type="text"
                data-i18n-placeholder="placeholderName"
                autocomplete="username"
              />
            </div>
            <div class="field">
              <label for="reg-password" data-i18n="labelPassword"></label>
              <input
                id="reg-password"
                type="password"
                data-i18n-placeholder="placeholderPassword"
                autocomplete="new-password"
              />
            </div>
            <div id="register-error" class="error-msg hidden"></div>
            <div id="register-success" class="success-msg hidden"></div>
            <button type="submit" id="register-btn">
              <span class="btn-text" data-i18n="btnCreateAccount"></span>
              <span class="btn-loader hidden"></span>
            </button>
          </form>
          <div class="auth-switch">
            <span data-i18n="haveAccount"></span>
            <button type="button" id="go-login" data-i18n="signIn"></button>
          </div>
        </div>
      </section>

      <!-- DASHBOARD VIEW -->
      <section id="view-dashboard" class="view hidden">
        <header class="dash-header">
          <div class="dash-header-left">
            <h2>Dance <em>Studio</em></h2>
          </div>
          <div class="dash-header-right">
            <span id="dash-username"></span>
            <button id="go-profile-btn" data-i18n="navProfile"></button>
            <button
              id="theme-toggle"
              class="btn-icon"
              aria-label="Toggle theme"
            >
              🌙
            </button>
            <button
              id="lang-toggle"
              class="btn-icon"
              aria-label="Toggle language"
            >
              EN
            </button>
            <button id="logout-btn" data-i18n="navLogout"></button>
          </div>
        </header>
        <main class="dash-main">
          <div class="stats-grid">
            <div class="stat-card" id="card-taken">
              <div class="stat-icon">💃</div>
              <div class="stat-info">
                <span class="stat-label" data-i18n="cardClassesTaken"></span>
                <span class="stat-value skeleton-val" id="stat-taken">—</span>
              </div>
            </div>
            <div class="stat-card" id="card-remaining">
              <div class="stat-icon">📋</div>
              <div class="stat-info">
                <span
                  class="stat-label"
                  data-i18n="cardClassesRemaining"
                ></span>
                <span class="stat-value skeleton-val" id="stat-remaining"
                  >—</span
                >
              </div>
            </div>
            <div class="stat-card" id="card-days">
              <div class="stat-icon">📅</div>
              <div class="stat-info">
                <span class="stat-label" data-i18n="cardDaysPayment"></span>
                <span class="stat-value skeleton-val" id="stat-days">—</span>
              </div>
            </div>
          </div>

          <div class="quick-register">
            <button
              class="btn-quick btn-quick-bachata"
              data-type="Bachata"
              data-i18n="btnBachata"
            ></button>
            <button
              class="btn-quick btn-quick-salsa"
              data-type="Salsa"
              data-i18n="btnSalsa"
            ></button>
            <button
              class="btn-quick btn-quick-cumbia"
              data-type="Cumbia"
              data-i18n="btnCumbia"
            ></button>
          </div>

          <div class="content-grid">
            <div class="calendar-section">
              <div class="calendar-header">
                <button class="cal-nav" id="cal-prev">‹</button>
                <span id="cal-title"></span>
                <button class="cal-nav" id="cal-next">›</button>
              </div>
              <div class="calendar-grid" id="cal-day-names"></div>
              <div id="cal-days" class="calendar-grid"></div>
              <div class="cal-legend">
                <span class="cal-dot dot-bachata"></span>Bachata
                <span class="cal-dot dot-salsa"></span>Salsa
                <span class="cal-dot dot-cumbia"></span>Cumbia
              </div>
            </div>

            <div class="classes-section">
              <div class="classes-top">
                <h3>
                  <span data-i18n="classHistory"></span>
                  <span id="classes-count" class="classes-count hidden"></span>
                </h3>
                <button
                  class="btn-add"
                  id="btn-open-register"
                  data-i18n="btnRegisterClass"
                ></button>
              </div>
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th data-i18n="colType"></th>
                      <th data-i18n="colDate"></th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="classes-tbody">
                    <tr id="classes-empty-row" class="hidden">
                      <td colspan="3">
                        <div class="empty-state">
                          <span class="empty-icon">🕺</span>
                          <p data-i18n="emptyTitle"></p>
                          <span data-i18n="emptySubtitle"></span>
                        </div>
                      </td>
                    </tr>
                    <tr class="skeleton-row">
                      <td><div class="skeleton"></div></td>
                      <td><div class="skeleton"></div></td>
                      <td></td>
                    </tr>
                    <tr class="skeleton-row">
                      <td><div class="skeleton"></div></td>
                      <td><div class="skeleton"></div></td>
                      <td></td>
                    </tr>
                    <tr class="skeleton-row">
                      <td><div class="skeleton"></div></td>
                      <td><div class="skeleton"></div></td>
                      <td></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </main>
      </section>

      <!-- PROFILE VIEW -->
      <section id="view-profile" class="view hidden">
        <header class="dash-header">
          <div class="dash-header-left">
            <h2>Dance <em>Studio</em></h2>
          </div>
          <div class="dash-header-right">
            <span id="profile-username"></span>
            <button id="go-dashboard-btn" data-i18n="navDashboard"></button>
            <button
              id="theme-toggle-profile"
              class="btn-icon"
              aria-label="Toggle theme"
            >
              🌙
            </button>
            <button
              id="lang-toggle-profile"
              class="btn-icon"
              aria-label="Toggle language"
            >
              EN
            </button>
            <button id="profile-logout-btn" data-i18n="navLogout"></button>
          </div>
        </header>
        <main class="dash-main profile-main">
          <div class="profile-grid">
            <div class="profile-card">
              <div class="profile-card-header">
                <span class="profile-card-icon" data-i18n="profileIcon"></span>
                <h3 data-i18n="profileTitle"></h3>
              </div>
              <form id="payment-form" novalidate>
                <div class="field">
                  <label for="prof-paid-at" data-i18n="labelPaidAt"></label>
                  <input id="prof-paid-at" type="date" />
                </div>
                <div class="field">
                  <label data-i18n="labelClassesPaid"></label>
                  <div class="classes-options">
                    <label class="option-pill">
                      <input type="radio" name="classes_paid" value="12" />
                      <span>12</span>
                    </label>
                    <label class="option-pill">
                      <input type="radio" name="classes_paid" value="15" />
                      <span>15</span>
                    </label>
                  </div>
                </div>
                <div id="payment-error" class="error-msg hidden"></div>
                <button type="submit" id="payment-btn">
                  <span class="btn-text" data-i18n="btnSaveChanges"></span>
                  <span class="btn-loader hidden"></span>
                </button>
              </form>
            </div>

            <div class="profile-card">
              <div class="profile-card-header">
                <span class="profile-card-icon" data-i18n="passwordIcon"></span>
                <h3 data-i18n="passwordTitle"></h3>
              </div>
              <p class="profile-card-note" data-i18n="passwordNote"></p>
              <form id="password-form" novalidate>
                <div class="field">
                  <label
                    for="prof-new-password"
                    data-i18n="labelNewPassword"
                  ></label>
                  <input
                    id="prof-new-password"
                    type="password"
                    data-i18n-placeholder="placeholderPassword"
                    autocomplete="new-password"
                  />
                </div>
                <div class="field">
                  <label
                    for="prof-confirm-password"
                    data-i18n="labelConfirmPassword"
                  ></label>
                  <input
                    id="prof-confirm-password"
                    type="password"
                    data-i18n-placeholder="placeholderPassword"
                    autocomplete="new-password"
                  />
                </div>
                <div id="password-error" class="error-msg hidden"></div>
                <button type="submit" id="password-btn">
                  <span class="btn-text" data-i18n="btnUpdatePassword"></span>
                  <span class="btn-loader hidden"></span>
                </button>
              </form>
            </div>
          </div>
        </main>
      </section>

      <!-- REGISTER CLASS MODAL -->
      <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
          <div class="modal-header">
            <h4 data-i18n="modalRegisterTitle"></h4>
            <button class="modal-close" id="modal-close">✕</button>
          </div>
          <form id="register-class-form" novalidate>
            <div class="field">
              <label for="class-type" data-i18n="labelType"></label>
              <select id="class-type">
                <option value="" data-i18n="selectType"></option>
                <option value="Bachata">Bachata</option>
                <option value="Salsa">Salsa</option>
                <option value="Cumbia">Cumbia</option>
              </select>
            </div>
            <div class="field">
              <label for="class-date" data-i18n="labelDate"></label>
              <input id="class-date" type="date" />
            </div>
            <div id="class-error" class="error-msg hidden"></div>
            <div class="modal-actions">
              <button
                type="button"
                class="btn-cancel"
                id="btn-cancel-register"
                data-i18n="btnCancel"
              ></button>
              <button
                type="submit"
                class="btn-save"
                data-i18n="btnSaveClass"
              ></button>
            </div>
          </form>
        </div>
      </div>

      <!-- CONFIRM DELETE MODAL -->
      <div id="confirm-overlay" class="modal-overlay hidden">
        <div class="modal modal-sm">
          <div class="modal-header">
            <h4 data-i18n="modalDeleteTitle"></h4>
          </div>
          <p class="confirm-msg" data-i18n="confirmDeleteMsg"></p>
          <div class="modal-actions">
            <button
              type="button"
              class="btn-cancel"
              id="confirm-cancel"
              data-i18n="btnCancel"
            ></button>
            <button
              type="button"
              class="btn-danger"
              id="confirm-delete"
              data-i18n="btnDelete"
            ></button>
          </div>
        </div>
      </div>

      <!-- TOAST -->
      <div id="toast" class="toast hidden"></div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
